---
name: "Release"

on: # yamllint disable-line rule:truthy rule:comments
  push:
    tags:
      - "v*"

permissions:
  contents: "read"

env:
  PYTHON_VERSION: "3.12"

jobs:
  publish-pypi:
    name: "Build and publish package"
    runs-on: "ubuntu-latest"
    environment: "pypi"
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v7"

      - name: "Set up Python"
        uses: "actions/setup-python@v6"
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: "pip"

      - name: "Install build tools"
        run: "python -m pip install --upgrade build poetry twine"

      - name: "Install documentation dependencies"
        run: "poetry install --with docs --no-root"

      - name: "Check tag matches package version"
        run: |
          set -euo pipefail
          VERSION="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${VERSION}."
            exit 1
          fi

      - name: "Build package"
        run: |
          poetry run mkdocs build --no-directory-urls --strict
          rm -rf dist
          python -m build

      - name: "Check package"
        run: "python -m twine check dist/*"

      - name: "Detect PyPI API token"
        id: "pypi-token"
        env:
          PYPI_API_TOKEN: "${{ secrets.PYPI_API_TOKEN }}"
        run: |
          if [ -n "${PYPI_API_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Publish package to PyPI with Trusted Publishing"
        if: "steps.pypi-token.outputs.has_token == 'false'"
        uses: "pypa/gh-action-pypi-publish@release/v1"

      - name: "Publish package to PyPI with API token"
        if: "steps.pypi-token.outputs.has_token == 'true'"
        uses: "pypa/gh-action-pypi-publish@release/v1"
        with:
          password: "${{ secrets.PYPI_API_TOKEN }}"
