---
name: "Release"
on: # yamllint disable-line rule:truthy rule:comments
  release:
    types: ["published"]

permissions:
  contents: "read"

env:
  RELEASE_REF_NAME: "${{ github.ref_name }}"

jobs:
  build:
    name: "Build package with poetry"
    runs-on: "ubuntu-latest"
    if: "startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: "actions/checkout@v7"
      - name: "Setup environment"
        uses: "networktocode/gh-action-setup-poetry-environment@v7"
        with:
          poetry-version: "2.1.3"
          python-version: "3.12"
          poetry-install-options: "--no-root"
      - name: "Build Documentation"
        run: "poetry run invoke build-and-check-docs"
      - name: "Run Poetry Build"
        run: "poetry build"

      - name: "Check that the release tag matches the version in pyproject.toml"
        run: |
          if [ "$RELEASE_REF_NAME" != "v$(poetry version -s)" ]; then exit 1; fi

      - uses: "actions/upload-artifact@v7"
        with:
          name: "distfiles"
          path: "dist/"
          if-no-files-found: "error"

  publish-github:
    name: "Publish to GitHub"
    runs-on: "ubuntu-latest"
    if: "startsWith(github.ref, 'refs/tags/v')"
    permissions:
      contents: "write"
    needs: "build"
    steps:
      - uses: "actions/checkout@v7"
      - name: "Retrieve built package from cache"
        uses: "actions/download-artifact@v8"
        with:
          name: "distfiles"
          path: "dist/"

      - name: "Upload binaries to release"
        run: "gh release upload \"$RELEASE_REF_NAME\" dist/*.{tar.gz,whl}"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  publish-pypi:
    name: "Push Package to PyPI"
    runs-on: "ubuntu-latest"
    if: "startsWith(github.ref, 'refs/tags/v')"
    needs: "build"
    environment: "pypi"
    permissions:
      contents: "read"
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: "write"
    steps:
      - name: "Retrieve built package from cache"
        uses: "actions/download-artifact@v8"
        with:
          name: "distfiles"
          path: "dist/"

      - name: "Publish package distributions to PyPI"
        uses: "pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b"  # v1.14.0

  slack-notify:
    needs:
      - "publish-github"
      - "publish-pypi"
    runs-on: "ubuntu-latest"
    env:
      # Secrets cannot be directly referenced in if: conditionals. They must be set as a job env var first.
      # Ref: https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#example-using-secrets
      SLACK_WEBHOOK_URL: "${{ secrets.OSS_PYPI_SLACK_WEBHOOK_URL }}"
      SLACK_WEBHOOK_TYPE: "INCOMING_WEBHOOK"
      SLACK_MESSAGE: >-
        *NOTIFICATION: NEW-RELEASE-PUBLISHED*\n
        Repository: <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>\n
        Release: <${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|${{ github.ref_name }}>\n
        Published by: <${{ github.server_url }}/${{ github.actor }}|${{ github.actor }}>
    steps:
      - name: "Send a notification to Slack"
        if: "${{ env.SLACK_WEBHOOK_URL != '' }}"
        uses: "slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c"  # v3.0.3
        with:
          payload: |
            {
              "text": "${{ env.SLACK_MESSAGE }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ env.SLACK_MESSAGE }}"
                  }
                }
              ]
            }

  create-post-release-pr:
    if: "contains(fromJSON('[\"main\", \"develop\"]'), github.event.release.target_commitish) || startsWith(github.event.release.target_commitish, 'next') || startsWith(github.event.release.target_commitish, 'ltm-')"
    permissions:
      contents: "write"
      pull-requests: "write"
    name: "${{ github.event.release.target_commitish == 'main' && 'Create a PR from main into develop' || format('Create a PR to merge into {0}', github.event.release.target_commitish) }}"
    needs:
      - "publish-github"
      - "publish-pypi"
    runs-on: "ubuntu-latest"
    env:
      RELEASE_TAG_NAME: "${{ github.event.release.tag_name }}"
      RELEASE_TARGET_COMMITISH: "${{ github.event.release.target_commitish }}"
    steps:
      - name: "Checkout source branch"
        uses: "actions/checkout@v7"
        with:
          ref: "${{ github.event.release.target_commitish }}"
          fetch-depth: 0

      - name: "Setup environment"
        uses: "networktocode/gh-action-setup-poetry-environment@v7"
        with:
          poetry-version: "2.1.3"
          poetry-install-options: "--no-root"

      - name: "Create release branch and bump version"
        id: "branch"
        run: |
          set -euo pipefail

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          SOURCE_BRANCH="$RELEASE_TARGET_COMMITISH"
          if [[ ! "$SOURCE_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "$SOURCE_BRANCH" == /* ]] || [[ "$SOURCE_BRANCH" == */ ]] || [[ "$SOURCE_BRANCH" == *..* ]]; then
            echo "Error: Invalid release target branch: $SOURCE_BRANCH"
            exit 1
          fi

          if [ "$SOURCE_BRANCH" = "main" ]; then
            TARGET_BRANCH="develop"
          else
            TARGET_BRANCH="$SOURCE_BRANCH"
          fi

          TAG_NAME="$RELEASE_TAG_NAME"
          if [[ ! "$TAG_NAME" =~ ^v[A-Za-z0-9._-]+$ ]]; then
            echo "Error: Invalid release tag: $TAG_NAME"
            exit 1
          fi
          VERSION="${TAG_NAME#v}"

          BRANCH_NAME="release-${VERSION}-to-${TARGET_BRANCH}"

          # Ensure release branch doesn't already exist
          if git rev-parse --verify -- "origin/$BRANCH_NAME" > /dev/null 2>&1; then
            echo "Error: Release branch $BRANCH_NAME already exists."
            exit 1
          fi

          git checkout -b "$BRANCH_NAME"

          poetry version prerelease
          git add pyproject.toml && git commit -m "Bump version"
          git push origin "$BRANCH_NAME"

          printf 'branch_name=%s\n' "$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          printf 'target_branch=%s\n' "$TARGET_BRANCH" >> "$GITHUB_OUTPUT"

      - name: "Create Pull Request"
        env:
          # To allow actions to run on PR, use Personal Access Token (GH_NAUTOBOT_BOT_TOKEN)
          # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows
          GH_TOKEN: "${{ secrets.GH_NAUTOBOT_BOT_TOKEN }}"
        run: |
          gh pr create \
            --title "Post release $RELEASE_TAG_NAME to ${{ steps.branch.outputs.target_branch }}" \
            --body "Please do a merge commit." \
            --base "${{ steps.branch.outputs.target_branch }}" \
            --head "${{ steps.branch.outputs.branch_name }}"

  sync-ltm-release-notes-to-develop:
    if: "startsWith(github.event.release.target_commitish, 'ltm-')"
    permissions:
      contents: "write"
      pull-requests: "write"
    name: "Sync release notes from ${{ github.event.release.target_commitish }} to develop"
    runs-on: "ubuntu-latest"
    needs:
      - "publish-github"
      - "publish-pypi"
    env:
      RELEASE_TAG_NAME: "${{ github.event.release.tag_name }}"
      RELEASE_TARGET_COMMITISH: "${{ github.event.release.target_commitish }}"
    steps:
      - name: "Checkout develop"
        uses: "actions/checkout@v7"
        with:
          ref: "develop"
          fetch-depth: 0

      - name: "Create branch and sync release notes from ltm"
        id: "branch"
        run: |
          set -euo pipefail

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          SOURCE_BRANCH="$RELEASE_TARGET_COMMITISH"
          if [[ ! "$SOURCE_BRANCH" =~ ^ltm-[A-Za-z0-9._/-]+$ ]] || [[ "$SOURCE_BRANCH" == *..* ]] || [[ "$SOURCE_BRANCH" == */ ]]; then
            echo "Error: Invalid LTM source branch: $SOURCE_BRANCH"
            exit 1
          fi

          TAG_NAME="$RELEASE_TAG_NAME"
          if [[ ! "$TAG_NAME" =~ ^v[A-Za-z0-9._-]+$ ]]; then
            echo "Error: Invalid release tag: $TAG_NAME"
            exit 1
          fi
          BRANCH_NAME="release-${TAG_NAME#v}-notes-to-develop"

          # Fetch the ltm source branch so we can checkout files from it
          git fetch origin "$SOURCE_BRANCH"

          # Ensure release branch doesn't already exist
          if git rev-parse --verify -- "origin/$BRANCH_NAME" > /dev/null 2>&1; then
            echo "Error: Release branch $BRANCH_NAME already exists."
            exit 1
          fi

          git switch -c "$BRANCH_NAME"
          git checkout "origin/$SOURCE_BRANCH" -- docs/admin/release_notes/

          # Check if there are any changes in /release_notes
          if git diff --staged --quiet; then
            echo "No release notes changes to sync from $SOURCE_BRANCH to develop."
            exit 0
          fi

          git commit -m "Sync release notes from $SOURCE_BRANCH"
          git push origin "$BRANCH_NAME"

          printf 'branch_name=%s\n' "$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: "Create Pull Request"
        if: "steps.branch.outputs.branch_name != ''"
        env:
          GH_TOKEN: "${{ secrets.GH_NAUTOBOT_BOT_TOKEN }}"
        run: |
          gh pr create \
            --title "Sync release notes from $RELEASE_TARGET_COMMITISH ($RELEASE_TAG_NAME) to develop" \
            --body "Please do a merge commit." \
            --base "develop" \
            --head "${{ steps.branch.outputs.branch_name }}"
