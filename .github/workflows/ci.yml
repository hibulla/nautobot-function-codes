---
name: "CI"
concurrency:  # Cancel any existing runs of this workflow for this same PR
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
on: # yamllint disable-line rule:truthy rule:comments
  push:
    branches:
      - "main"
      - "develop"
  pull_request: ~

env:
  APP_NAME: "nautobot-function-codes"
  PYTHON_VERSION: "3.12"
  NAUTOBOT_VERSION: "3.1.0"
  INVOKE_NAUTOBOT_FUNCTION_CODES_PYTHON_VER: "3.12"
  INVOKE_NAUTOBOT_FUNCTION_CODES_NAUTOBOT_VER: "3.1.0"

jobs:
  ci:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v7"
      - name: "Setup environment"
        uses: "networktocode/gh-action-setup-poetry-environment@v7"
        with:
          poetry-version: "2.1.3"
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: "Check poetry.lock"
        env:
          INVOKE_NAUTOBOT_FUNCTION_CODES_LOCAL: "True"
        run: "poetry run invoke lock --check"
      - name: "Linting: ruff"
        env:
          INVOKE_NAUTOBOT_FUNCTION_CODES_LOCAL: "True"
        run: |
          poetry run invoke ruff --action format
          poetry run invoke ruff --action lint
      - name: "Constrain Nautobot version and regenerate lock file"
        env:
          INVOKE_NAUTOBOT_FUNCTION_CODES_LOCAL: "true"
        run: "poetry run invoke lock --constrain-nautobot-ver --constrain-python-ver=${{ env.PYTHON_VERSION }}"
      - name: "Set up Docker Buildx"
        id: "buildx"
        uses: "docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5"  # v4.1.0
      - name: "Build"
        uses: "docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a"  # v7.3.0
        with:
          builder: "${{ steps.buildx.outputs.name }}"
          context: "./"
          push: false
          load: true
          tags: "${{ env.APP_NAME }}/nautobot:${{ env.NAUTOBOT_VERSION }}-py${{ env.PYTHON_VERSION }}"
          file: "./development/Dockerfile"
          cache-from: "type=gha,scope=${{ env.NAUTOBOT_VERSION }}-py${{ env.PYTHON_VERSION }}"
          cache-to: "type=gha,scope=${{ env.NAUTOBOT_VERSION }}-py${{ env.PYTHON_VERSION }}"
          build-args: |
            NAUTOBOT_VER=${{ env.NAUTOBOT_VERSION }}
            PYTHON_VER=${{ env.PYTHON_VERSION }}
            CI=true
      - name: "Linting: pylint"
        run: "poetry run invoke pylint"
      - name: "Checking: App Config"
        run: "poetry run invoke validate-app-config"
      - name: "Checking: migrations"
        run: "poetry run invoke check-migrations"
      - name: "Run Tests"
        run: "poetry run invoke unittest"
